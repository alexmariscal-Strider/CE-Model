<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CE + PFA Pathway Capacity Model</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; padding: 20px; font-size: 13px; }
  h1 { font-size: 17px; font-weight: 700; color: #f8fafc; margin-bottom: 4px; }
  .subtitle { color: #94a3b8; font-size: 12px; margin-bottom: 16px; }

  .month-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .month-bar-label { font-size: 11px; color: #64748b; margin-right: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .month-btn { padding: 5px 11px; border-radius: 6px; border: 1px solid #2d3548; background: #1e2330; color: #94a3b8; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .month-btn:hover { border-color: #6366f1; color: #c7d2fe; }
  .month-btn.active { background: #312e81; border-color: #6366f1; color: #e0e7ff; font-weight: 600; }

  .mode-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .mode-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .mode-bar { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #2d3548; }
  .mode-btn { padding: 7px 16px; background: #1e2330; color: #94a3b8; font-size: 12px; cursor: pointer; border: none; transition: all 0.15s; font-weight: 500; white-space: nowrap; }
  .mode-btn:hover { background: #252c3f; color: #e2e8f0; }
  .mode-btn.active-current { background: #1e3a5f; color: #93c5fd; font-weight: 700; }
  .mode-btn.active-future  { background: #14532d; color: #86efac; font-weight: 700; }

  .grid { display: grid; grid-template-columns: 340px 1fr; gap: 16px; }
  .panel { background: #1e2330; border-radius: 10px; padding: 16px; border: 1px solid #2d3548; }
  .panel h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 12px; }

  .section-label { font-size: 11px; font-weight: 600; color: #7c8db0; text-transform: uppercase; letter-spacing: 0.06em; margin: 14px 0 8px; border-top: 1px solid #2d3548; padding-top: 10px; }
  .section-label:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
  .input-row label { color: #cbd5e1; font-size: 12px; flex: 1; line-height: 1.35; }
  .input-row input[type=range]  { width: 84px; accent-color: #6366f1; flex-shrink: 0; }
  .input-row input[type=number] { width: 72px; background: #0f1117; border: 1px solid #3d4a63; border-radius: 5px; color: #f1f5f9; padding: 3px 6px; font-size: 12px; text-align: right; flex-shrink: 0; }
  .val-badge { min-width: 40px; text-align: right; font-size: 12px; font-weight: 600; color: #a5b4fc; flex-shrink: 0; }
  .ro-val    { min-width: 60px; text-align: right; font-size: 12px; font-weight: 600; color: #f1f5f9; background: #0f1117; border: 1px solid #2d3548; border-radius: 5px; padding: 3px 7px; flex-shrink: 0; }

  .badge-current { display:inline-block; font-size:10px; padding:1px 6px; border-radius:4px; background:#1e3a5f; color:#93c5fd; font-weight:700; margin-left:5px; vertical-align:middle; }
  .badge-future  { display:inline-block; font-size:10px; padding:1px 6px; border-radius:4px; background:#14532d; color:#86efac; font-weight:700; margin-left:5px; vertical-align:middle; }
  .hint { font-size:11px; color:#64748b; margin-bottom:8px; line-height:1.5; }

  /* KEY METRICS */
  .results-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 4px; }
  .stat-card { background: #252c3f; border-radius: 8px; padding: 12px; border: 1px solid #2d3548; }
  .stat-card.hl  { border-color: #6366f1; background: #1e1f3a; }
  .stat-card.grn { border-color: #22c55e; background: #0f2a1a; }
  .stat-card.yel { border-color: #f59e0b; background: #271e0a; }
  .stat-card.red { border-color: #ef4444; background: #2a0f0f; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #64748b; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; color: #f1f5f9; }
  .stat-sub   { font-size: 11px; color: #64748b; margin-top: 2px; }

  /* ENROLLMENT TARGET BANNER */
  .target-banner { display:flex; align-items:center; gap:16px; background:#1a1f30; border:1px solid #2d3548; border-radius:8px; padding:10px 14px; margin-bottom:4px; flex-wrap:wrap; }
  .tb-item { display:flex; flex-direction:column; align-items:center; }
  .tb-label { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:#64748b; margin-bottom:2px; }
  .tb-val   { font-size:18px; font-weight:700; color:#f1f5f9; }
  .tb-sep   { width:1px; height:36px; background:#2d3548; }
  .tb-delta-pos { font-size:13px; font-weight:700; color:#22c55e; }
  .tb-delta-neg { font-size:13px; font-weight:700; color:#ef4444; }
  .tb-delta-neu { font-size:13px; font-weight:700; color:#94a3b8; }

  /* DUAL FUNNEL */
  .funnel-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  .funnel-section { margin-bottom: 0; }
  .funnel-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px; }
  .funnel-title.std-col  { color: #6366f1; }
  .funnel-title.cap-col  { color: #06b6d4; }
  .funnel-title.pfa-col  { color: #f59e0b; }
  .funnel-title.comb-col { color: #22c55e; }

  .funnel-row { display: flex; align-items: center; margin-bottom: 5px; gap: 8px; }
  .funnel-lbl { width: 145px; font-size: 11px; color: #94a3b8; flex-shrink: 0; }
  .funnel-bar-wrap { flex:1; background:#0f1117; border-radius:3px; height:20px; overflow:hidden; position:relative; }
  .funnel-bar { height:100%; border-radius:3px; transition:width .3s; display:flex; align-items:center; padding-left:8px; min-width:36px; }
  .funnel-bar span { font-size:11px; font-weight:600; color:#fff; white-space:nowrap; }
  .bar-std  { background: linear-gradient(90deg,#4f46e5,#6366f1); }
  .bar-cap  { background: linear-gradient(90deg,#0891b2,#06b6d4); }
  .bar-pfa  { background: linear-gradient(90deg,#d97706,#f59e0b); }
  .bar-comb { background: linear-gradient(90deg,#16a34a,#22c55e); }

  .funnel-compare-note { font-size:11px; color:#64748b; background:#151b28; border-radius:6px; padding:8px 10px; margin-bottom:14px; border-left:3px solid #2d3548; line-height:1.5; }

  /* TABLES */
  .capacity-table { width:100%; border-collapse:collapse; font-size:12px; }
  .capacity-table th { text-align:left; color:#64748b; font-weight:600; font-size:10px; text-transform:uppercase; letter-spacing:.06em; padding:4px 8px; border-bottom:1px solid #2d3548; }
  .capacity-table td { padding:6px 8px; border-bottom:1px solid #1a2030; color:#cbd5e1; }
  .capacity-table tr:last-child td { border-bottom:none; }
  .capacity-table .em { color:#f1f5f9; font-weight:600; }
  .capacity-table .g  { color:#22c55e; }
  .capacity-table .w  { color:#f59e0b; }
  .capacity-table .b  { color:#ef4444; }

  .divider { border:none; border-top:1px solid #2d3548; margin:14px 0; }
  .note { font-size:11px; color:#94a3b8; background:#151b28; border-radius:6px; padding:10px 12px; border-left:3px solid #3d4a63; margin-top:12px; line-height:1.6; }
  .note.fut { border-left-color:#22c55e; }
  .warn-box { font-size:11px; color:#fca5a5; background:#2a0f0f; border-radius:5px; padding:6px 10px; margin-top:8px; display:none; }
  .warn-box.on { display:block; }
  .right-col { display:flex; flex-direction:column; gap:16px; }
</style>
</head>
<body>

<h1>CE + PFA Pathway Capacity Model</h1>
<p class="subtitle">Switch pathway mode and month · Demand funnel vs. Capacity funnel shows enrollment over/under vs. target</p>

<div class="mode-wrap">
  <span class="mode-label">Pathway Mode:</span>
  <div class="mode-bar">
    <button class="mode-btn active-current" id="btn-current" onclick="setMode('current')">📞 Current State — PFA → CE Phone Screen</button>
    <button class="mode-btn" id="btn-future" onclick="setMode('future')">🚀 Future State — PFA Converts → Skip to CE Eval</button>
  </div>
</div>

<div class="month-bar">
  <span class="month-bar-label">Month:</span>
  <button class="month-btn active" onclick="setMonth(0)">May</button>
  <button class="month-btn" onclick="setMonth(1)">Jun</button>
  <button class="month-btn" onclick="setMonth(2)">Jul</button>
  <button class="month-btn" onclick="setMonth(3)">Aug</button>
  <button class="month-btn" onclick="setMonth(4)">Sep</button>
  <button class="month-btn" onclick="setMonth(5)">Oct</button>
  <button class="month-btn" onclick="setMonth(6)">Nov</button>
  <button class="month-btn" onclick="setMonth(7)">Dec</button>
</div>

<div class="grid">
  <div class="panel">
    <h2>Inputs</h2>

    <div class="section-label">Volume</div>
    <div class="input-row">
      <label>Accepted Apps (projected)</label>
      <input type="number" id="apps-input" value="1147" min="100"
